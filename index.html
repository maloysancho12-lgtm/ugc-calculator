<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Калькулятор ціни на UGC-відео</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f4f4f5;
    --text: #111111;
    --text-secondary: #6b6b6b;
    --border: #e5e5e5;
    --accent: #5B4FE9;
    --accent-bg: #EEEDFE;
    --accent-text: #26215C;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 4px 0 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 20px;
  }

  .section-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 8px;
    font-weight: 500;
  }

  .base-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .base-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }

  .base-btn.active {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent-text);
    font-weight: 600;
  }

  .base-btn .price-tag {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .base-btn.active .price-tag {
    color: var(--accent-text);
  }

  .opt-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .opt-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .opt-row.checked {
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  .opt-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    accent-color: var(--accent);
    margin: 0;
  }

  .opt-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .opt-title {
    font-size: 14px;
  }

  .opt-sub {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .result-box {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 16px 0 4px;
    margin-top: 8px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }

  .result-label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .result-price {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
  }

  .result-unit {
    font-size: 13px;
    color: var(--text-secondary);
    margin-left: 4px;
  }

  .send-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .send-btn:active {
    opacity: 0.85;
  }
</style>
</head>
<body>

  <h1>Скільки коштує ваше відео</h1>
  <p class="subtitle">Оберіть тип відео і додайте фактори складності — отримаєте орієнтовну ціну.</p>

  <p class="section-label">Тип відео</p>
  <div class="base-group" id="base-group">
    <div class="base-btn active" data-price="30" data-label="Talking head">
      <span>Talking head</span>
      <span class="price-tag">від $30</span>
    </div>
    <div class="base-btn" data-price="45" data-label="Демонстрація продукту">
      <span>Демонстрація продукту</span>
      <span class="price-tag">від $45</span>
    </div>
    <div class="base-btn" data-price="60" data-label="Сторітелінг / кілька сцен">
      <span>Сторітелінг / кілька сцен</span>
      <span class="price-tag">від $60</span>
    </div>
  </div>

  <p class="section-label">Додаткові фактори</p>
  <div class="opt-grid" id="opt-grid">
    <label class="opt-row">
      <input type="checkbox" data-add="15" data-name="Додаткова сцена / локація">
      <span class="opt-text">
        <span class="opt-title">Додаткова сцена / локація</span>
        <span class="opt-sub">+$15</span>
      </span>
    </label>
    <label class="opt-row">
      <input type="checkbox" data-add="10" data-name="Рух камери (не статика)">
      <span class="opt-text">
        <span class="opt-title">Рух камери (не статика)</span>
        <span class="opt-sub">+$10</span>
      </span>
    </label>
    <label class="opt-row">
      <input type="checkbox" data-add="20" data-name="Взаємодія з продуктом">
      <span class="opt-text">
        <span class="opt-title">Взаємодія з продуктом</span>
        <span class="opt-sub">+$20</span>
      </span>
    </label>
    <label class="opt-row">
      <input type="checkbox" data-add="15" data-name="Другий аватар у кадрі">
      <span class="opt-text">
        <span class="opt-title">Другий аватар у кадрі</span>
        <span class="opt-sub">+$15</span>
      </span>
    </label>
    <label class="opt-row">
      <input type="checkbox" data-add="10" data-name="Дубляж на 1 мову">
      <span class="opt-text">
        <span class="opt-title">Дубляж на 1 мову</span>
        <span class="opt-sub">+$10</span>
      </span>
    </label>
    <label class="opt-row">
      <input type="checkbox" data-add="12" data-name="Брендовані елементи / лого">
      <span class="opt-text">
        <span class="opt-title">Брендовані елементи / лого</span>
        <span class="opt-sub">+$12</span>
      </span>
    </label>
  </div>

  <div class="result-box">
    <div class="result-row">
      <span class="result-label" id="breakdown">Talking head</span>
      <span>
        <span class="result-price" id="total">$30</span>
        <span class="result-unit">/ відео</span>
      </span>
    </div>
    <button class="send-btn" id="send-btn">Надіслати розрахунок</button>
  </div>

<script>
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    tg.expand();

    // Sync with Telegram theme colors if available
    const root = document.documentElement;
    if (tg.themeParams) {
      const tp = tg.themeParams;
      if (tp.bg_color) root.style.setProperty('--bg', tp.bg_color);
      if (tp.secondary_bg_color) root.style.setProperty('--bg-secondary', tp.secondary_bg_color);
      if (tp.text_color) root.style.setProperty('--text', tp.text_color);
      if (tp.hint_color) root.style.setProperty('--text-secondary', tp.hint_color);
      if (tp.button_color) {
        root.style.setProperty('--accent', tp.button_color);
      }
    }
  }

  let basePrice = 30;
  let baseLabel = "Talking head";

  const baseButtons = document.querySelectorAll('.base-btn');
  baseButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      baseButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      basePrice = parseFloat(btn.dataset.price);
      baseLabel = btn.dataset.label;
      recalc();
    });
  });

  document.querySelectorAll('.opt-row').forEach(row => {
    const cb = row.querySelector('input[type="checkbox"]');
    row.addEventListener('click', (e) => {
      if (e.target.tagName !== 'INPUT') {
        cb.checked = !cb.checked;
      }
      row.classList.toggle('checked', cb.checked);
      recalc();
    });
  });

  function recalc() {
    let total = basePrice;
    let extras = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
      total += parseFloat(cb.dataset.add);
      extras.push(cb.dataset.name);
    });
    document.getElementById('total').textContent = '$' + Math.round(total);
    const breakdownText = extras.length > 0
      ? baseLabel + ' + ' + extras.length + ' ' + (extras.length === 1 ? 'фактор' : 'фактори')
      : baseLabel;
    document.getElementById('breakdown').textContent = breakdownText;
    return { total: Math.round(total), baseLabel, extras };
  }

  document.getElementById('send-btn').addEventListener('click', () => {
    const result = recalc();
    const message = {
      type: 'price_calculation',
      base: result.baseLabel,
      extras: result.extras,
      total: result.total
    };

    if (tg) {
      // Sends data back to the bot — bot receives this in web_app_data
      tg.sendData(JSON.stringify(message));
    } else {
      // Fallback for testing outside Telegram
      alert('Розрахунок: ' + result.baseLabel + ' = $' + result.total +
            (result.extras.length ? '\n\nДодатково:\n' + result.extras.join('\n') : ''));
    }
  });

  recalc();
</script>

</body>
</html>
